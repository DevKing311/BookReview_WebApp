{% extends "base.html" %} 

{% block content %}

<section class="review-section" style="margin: 40px 0">
  <div class="container">
    <h2>Login</h2>
    {% if error %}
  <div style="
      background-color: #ffe6e6;
      color: #cc0000;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 6px;
      text-align: center;
  ">
    {{ error }}
  </div>
{% endif %}

    <form method="POST">
      {% csrf_token %}

      <div class="form-group">
        <label for="username">Username</label>
        <input name="username" placeholder="Enter username" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          name="password"
          placeholder="Password"
          required
        />
      </div>

      <div class="form-group" style="display: flex; justify-content: end; align-items: center; column-gap: 10px;">
          <a href="{% url 'register' %}" >Don't have an account?</a>
        <button type="submit" class="btn">Login</button>
      </div>
    </form>
  </div>
</section>

{% endblock content %}
